<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ICE Inc. — Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #07090f;
      --surface:     #0d1117;
      --surface2:    #131720;
      --surface3:    #1a2030;
      --border:      #1e2535;
      --border2:     #252d3e;
      --text:        #e2e8f0;
      --text2:       #94a3b8;
      --text3:       #64748b;
      --accent:      #1d4ed8;
      --accent2:     #2563eb;
      --accent-glow: rgba(29,78,216,0.15);
      --white:       #ffffff;
      --pending:     #475569;
      --in-progress: #2563eb;
      --blocked:     #dc2626;
      --done:        #16a34a;
      --cancelled:   #374151;
      --radius-sm:   6px;
      --radius:      8px;
      --radius-lg:   12px;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      height: 52px;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 0;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-right: 28px;
      border-right: 1px solid var(--border);
      margin-right: 20px;
    }
    .brand-logo {
      width: 28px; height: 28px;
      background: var(--accent2);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff; letter-spacing: -1px;
    }
    .brand-name {
      font-size: 13px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--white);
    }
    .brand-sub { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }

    /* Nav */
    .nav { display: flex; align-items: center; gap: 2px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 14px; border-radius: var(--radius-sm);
      background: none; border: none;
      color: var(--text3); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active { color: var(--white); background: var(--surface3); }
    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.8; }

    /* Right side */
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .live-indicator {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; color: var(--text3);
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text3); flex-shrink: 0; transition: background 0.3s;
    }
    .live-dot.live { background: #22c55e; box-shadow: 0 0 6px #22c55e88; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    .user-menu {
      display: flex; align-items: center; gap: 9px;
      padding: 5px 12px 5px 5px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 999px; cursor: pointer;
    }
    .user-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--accent2); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 12px; font-weight: 500; color: var(--text); }
    .sign-out-btn {
      font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer;
      padding: 0; transition: color 0.15s; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .sign-out-btn:hover { color: var(--text); }

    /* ── Breadcrumb bar ── */
    .breadcrumb-bar {
      display: flex; align-items: center; gap: 8px;
      height: 40px; padding: 0 24px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; font-size: 12px; color: var(--text3);
    }
    .breadcrumb-bar.hidden { display: none; }
    .bc-sep { color: var(--border2); }
    .bc-link { color: var(--text3); background: none; border: none; cursor: pointer; font-size: 12px; padding: 0; }
    .bc-link:hover { color: var(--text); }
    .bc-current { color: var(--text); font-weight: 500; }
    .dept-color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── KPI bar ── */
    .kpi-bar {
      display: flex; align-items: stretch;
      height: 48px; padding: 0 24px; gap: 28px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .kpi-bar.hidden { display: none; }
    .kpi-item { display: flex; align-items: center; gap: 8px; }
    .kpi-divider { width: 1px; background: var(--border); align-self: stretch; margin: 10px 0; }
    .kpi-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .kpi-num { font-size: 16px; font-weight: 700; color: var(--white); }
    .kpi-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
    .kpi-spacer { flex: 1; }
    .kpi-sync { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; }

    /* ── Views ── */
    .view { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .view.active { display: flex; }

    /* ── Board view ── */
    .board-wrap { display: flex; flex: 1; overflow: hidden; }
    .board {
      display: flex; gap: 14px;
      padding: 20px 24px; overflow-x: auto; flex: 1; align-items: flex-start;
    }
    .column {
      flex: 0 0 260px; min-width: 260px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); display: flex;
      flex-direction: column; max-height: 100%;
    }
    .col-header {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .col-title { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text2); }
    .col-count {
      margin-left: auto; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 999px; padding: 1px 7px; font-size: 11px; font-weight: 600; color: var(--text3);
    }
    .col-body {
      flex: 1; overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 7px;
    }
    .col-body::-webkit-scrollbar { width: 3px; }
    .col-body::-webkit-scrollbar-track { background: transparent; }
    .col-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .empty-col { text-align: center; padding: 28px 12px; color: var(--text3); font-size: 12px; }

    /* ── Task card ── */
    .task-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 11px 12px;
      cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .task-card:hover { border-color: var(--accent2); box-shadow: 0 0 0 1px var(--accent-glow); }
    .task-id { font-size: 10px; font-family: monospace; color: var(--text3); margin-bottom: 5px; }
    .task-title {
      font-size: 12px; font-weight: 500; line-height: 1.5; margin-bottom: 9px; color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .task-footer { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .agent-tag {
      display: inline-flex; align-items: center; gap: 4px;
      border-radius: 4px; padding: 2px 7px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.02em;
      max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .task-age { font-size: 10px; color: var(--text3); white-space: nowrap; }

    /* ── Sidebar ── */
    .sidebar {
      width: 340px; flex-shrink: 0; border-left: 1px solid var(--border);
      background: var(--surface); display: flex; flex-direction: column;
      overflow: hidden; transition: width 0.2s;
    }
    .sidebar.hidden { width: 0; border-left: none; }
    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .sidebar-title { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); }
    .close-btn { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; line-height: 1; }
    .close-btn:hover { color: var(--text); }
    .sidebar-body { flex: 1; overflow-y: auto; padding: 16px; }
    .detail-section { margin-bottom: 20px; }
    .detail-label {
      font-size: 10px; color: var(--text3); text-transform: uppercase;
      letter-spacing: 0.07em; margin-bottom: 5px; font-weight: 600;
    }
    .detail-value { font-size: 13px; line-height: 1.55; color: var(--text); }
    .status-chip {
      display: inline-block; padding: 3px 10px; border-radius: 4px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .detail-mono { font-family: monospace; font-size: 11px; color: var(--text3); word-break: break-all; }
    .detail-pre { white-space: pre-wrap; font-size: 11px; color: var(--text2); line-height: 1.6; }
    .detail-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .agent-link { color: var(--accent2); text-decoration: none; font-weight: 600; }
    .agent-link:hover { text-decoration: underline; }

    /* ── Departments view ── */
    .dept-container { flex: 1; overflow-y: auto; padding: 28px 24px; }
    .dept-container::-webkit-scrollbar { width: 6px; }
    .dept-container::-webkit-scrollbar-track { background: transparent; }
    .dept-container::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    .section-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
    .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; max-width: 1400px; }

    /* ── Department card ── */
    .dept-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .dept-card:hover { border-color: var(--border2); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .dept-card-top {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .dept-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .dept-icon-wrap {
      width: 38px; height: 38px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .dept-name { font-size: 15px; font-weight: 700; color: var(--white); margin-bottom: 3px; }
    .dept-desc { font-size: 11px; color: var(--text3); line-height: 1.5; }
    .dept-status-chip {
      font-size: 10px; font-weight: 700; padding: 3px 8px;
      border-radius: 4px; letter-spacing: 0.06em; text-transform: uppercase; flex-shrink: 0;
    }
    /* Progress bar */
    .dept-progress { margin-top: 14px; }
    .dept-progress-track {
      height: 3px; background: var(--border); border-radius: 2px;
      overflow: hidden; display: flex; margin-bottom: 10px;
    }
    .dept-progress-seg { height: 100%; }
    .dept-kpis { display: flex; gap: 16px; }
    .dept-kpi { display: flex; flex-direction: column; gap: 2px; }
    .dept-kpi-num { font-size: 18px; font-weight: 700; color: var(--white); line-height: 1; }
    .dept-kpi-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
    /* Agents roster */
    .dept-card-agents { padding: 12px 20px 14px; }
    .agents-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; margin-bottom: 10px; }
    .agent-row {
      display: flex; align-items: center; gap: 10px; padding: 7px 0;
      border-top: 1px solid var(--border); cursor: pointer;
      transition: background 0.1s; margin: 0 -20px; padding-left: 20px; padding-right: 20px;
    }
    .agent-row:hover { background: var(--surface2); }
    .agent-row-avatar {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .agent-row-name { font-size: 12px; font-weight: 500; flex: 1; }
    .agent-row-stats { display: flex; align-items: center; gap: 8px; }
    .agent-row-stat { display: flex; align-items: center; gap: 3px; font-size: 11px; }
    .agent-row-dot { width: 6px; height: 6px; border-radius: 50%; }
    .agent-active-pip {
      width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e; box-shadow: 0 0 5px #22c55e88;
    }

    /* ── Department detail view ── */
    .dept-detail-container { flex: 1; overflow-y: auto; padding: 24px; }
    .dept-detail-agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; max-width: 1200px; }
    .agent-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px;
      cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .agent-card:hover { border-color: var(--border2); box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
    .agent-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .agent-avatar-lg {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .agent-card-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
    .agent-card-sub { font-size: 11px; color: var(--text3); }
    .agent-chip {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 4px; letter-spacing: 0.05em; text-transform: uppercase; flex-shrink: 0; margin-left: auto;
    }
    .agent-progress-track {
      height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
      display: flex; margin-bottom: 10px;
    }
    .agent-stats-row { display: flex; gap: 12px; }
    .agent-stat-item { display: flex; align-items: center; gap: 4px; font-size: 11px; }
    .agent-stat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .agent-stat-num { font-weight: 600; }
    .agent-stat-lbl { color: var(--text3); }

    /* Toast */
    .toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
    .toast {
      background: var(--surface3); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 9px 14px; font-size: 12px; color: var(--text);
      animation: toastIn 0.2s ease; letter-spacing: 0.02em;
    }
    @keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    /* Loading */
    .loading {
      display: flex; align-items: center; justify-content: center;
      flex: 1; flex-direction: column; gap: 12px; color: var(--text3); font-size: 13px;
    }
    .spinner {
      width: 28px; height: 28px; border: 2px solid var(--border);
      border-top-color: var(--accent2); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbars */
    .board::-webkit-scrollbar { height: 5px; }
    .board::-webkit-scrollbar-track { background: transparent; }
    .board::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ═══════════════════════════ TOP BAR ═══════════════════════════ -->
<header class="topbar">
  <div class="brand">
    <div class="brand-logo">I</div>
    <div>
      <div class="brand-name">Ice Inc.</div>
      <div class="brand-sub">Mission Control</div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-item active" data-view="board" onclick="switchView('board')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="14" rx="1"/><rect x="9" y="1" width="6" height="9" rx="1"/><rect x="9" y="12" width="6" height="3" rx="1"/></svg>
      Board
    </button>
    <button class="nav-item" data-view="departments" onclick="switchView('departments')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      Departments
    </button>
  </nav>

  <div class="topbar-right">
    <div class="live-indicator">
      <div class="live-dot" id="live-dot"></div>
      <span id="live-label">Connecting</span>
    </div>
    <div class="user-menu">
      <div class="user-avatar" id="user-avatar"></div>
      <span class="user-name" id="user-name">…</span>
      <button class="sign-out-btn" onclick="location.href='/auth/logout'">Sign out</button>
    </div>
  </div>
</header>

<!-- ═══════════════════════ BREADCRUMB BAR ════════════════════════ -->
<div class="breadcrumb-bar hidden" id="breadcrumb-bar">
  <button class="bc-link" id="bc-home" onclick="switchView('departments')">Departments</button>
  <span class="bc-sep">›</span>
  <span id="bc-dept"></span>
  <span class="bc-sep bc-agent-sep hidden">›</span>
  <span id="bc-agent" class="bc-current"></span>
</div>

<!-- ═══════════════════════════ KPI BAR ══════════════════════════ -->
<div class="kpi-bar" id="kpi-bar">
  <div class="kpi-item">
    <div class="kpi-dot" style="background:var(--pending)"></div>
    <span class="kpi-num" id="kpi-pending">0</span>
    <span class="kpi-label">Pending</span>
  </div>
  <div class="kpi-divider"></div>
  <div class="kpi-item">
    <div class="kpi-dot" style="background:var(--in-progress)"></div>
    <span class="kpi-num" id="kpi-inprogress">0</span>
    <span class="kpi-label">In Progress</span>
  </div>
  <div class="kpi-divider"></div>
  <div class="kpi-item">
    <div class="kpi-dot" style="background:var(--blocked)"></div>
    <span class="kpi-num" id="kpi-blocked">0</span>
    <span class="kpi-label">Blocked</span>
  </div>
  <div class="kpi-divider"></div>
  <div class="kpi-item">
    <div class="kpi-dot" style="background:var(--done)"></div>
    <span class="kpi-num" id="kpi-done">0</span>
    <span class="kpi-label">Completed</span>
  </div>
  <div class="kpi-divider"></div>
  <div class="kpi-item">
    <span class="kpi-num" id="kpi-total" style="color:var(--text2)">0</span>
    <span class="kpi-label">Total Tasks</span>
  </div>
  <div class="kpi-spacer"></div>
  <span class="kpi-sync" id="kpi-sync">—</span>
</div>

<!-- ═══════════════════ VIEW: BOARD ═══════════════════ -->
<div class="view active" id="view-board">
  <div class="board-wrap">
    <div class="board" id="board">
      <div class="loading"><div class="spinner"></div>Loading…</div>
    </div>
    <div class="sidebar hidden" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Task Details</span>
        <button class="close-btn" onclick="closeSidebar('sidebar')">×</button>
      </div>
      <div class="sidebar-body" id="sidebar-body"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════ VIEW: DEPARTMENTS ═══════════════════ -->
<div class="view" id="view-departments">
  <div class="dept-container">
    <div class="section-header">
      <span class="section-title" id="dept-section-title">Departments</span>
    </div>
    <div class="dept-grid" id="dept-grid">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- ═══════════════════ VIEW: DEPARTMENT DETAIL ═══════════════════ -->
<div class="view" id="view-dept-detail">
  <div class="dept-detail-container">
    <div class="section-header">
      <span class="section-title" id="dept-detail-title">Agents</span>
    </div>
    <div class="dept-detail-agents-grid" id="dept-agents-grid"></div>
  </div>
</div>

<!-- ═══════════════════ VIEW: AGENT BOARD ═══════════════════ -->
<div class="view" id="view-agent-board">
  <div class="board-wrap">
    <div class="board" id="board-agent">
      <div class="loading"><div class="spinner"></div></div>
    </div>
    <div class="sidebar hidden" id="sidebar-agent">
      <div class="sidebar-header">
        <span class="sidebar-title">Task Details</span>
        <button class="close-btn" onclick="closeSidebar('sidebar-agent')">×</button>
      </div>
      <div class="sidebar-body" id="sidebar-agent-body"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
// ================================================================
// Data
// ================================================================
const DEPT_CONFIG = {
  "Acquisitions":          { color: "#1a56db", agents: ["property-sourcer","deal-screener","underwriter"] },
  "Sales":                 { color: "#0891b2", agents: ["buyer-sourcer","prospector","matchmaker"] },
  "Marketing":             { color: "#7c3aed", agents: ["marketing-agent"] },
  "Research & Intelligence":{ color: "#0ea5e9", agents: ["research-agent"] },
  "Client Relations":      { color: "#059669", agents: ["lead-agent","investor-profiler","owner-researcher"] },
};

function agentDept(name) {
  for (const [d, cfg] of Object.entries(DEPT_CONFIG)) {
    if (cfg.agents.includes(name)) return d;
  }
  return "Operations";
}
function deptColor(name) { return DEPT_CONFIG[name]?.color || "#1d4ed8"; }
function agentColor(name) {
  const dept = agentDept(name);
  return deptColor(dept);
}

const COLUMNS = [
  { key:"pending",     label:"Pending",     color:"var(--pending)" },
  { key:"in_progress", label:"In Progress", color:"var(--in-progress)" },
  { key:"blocked",     label:"Blocked",     color:"var(--blocked)" },
  { key:"done",        label:"Completed",   color:"var(--done)" },
  { key:"cancelled",   label:"Cancelled",   color:"var(--cancelled)" },
];

let board = {};
let currentView = "board";
let currentDept = null;
let currentAgent = null;
let selectedTask = { board: null, agent: null };
let eventSource = null;

// ================================================================
// Auth
// ================================================================
async function initUser() {
  try {
    const r = await fetch("/auth/me");
    const d = await r.json();
    if (!d.authenticated) { location.href = "/login"; return; }
    const u = d.user;
    document.getElementById("user-name").textContent = u.name || u.email;
    const av = document.getElementById("user-avatar");
    if (u.picture) av.innerHTML = `<img src="${u.picture}" alt="">`;
    else av.textContent = (u.name || u.email)[0].toUpperCase();
  } catch(e) { console.error(e); }
}

// ================================================================
// Helpers
// ================================================================
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function timeAgo(ts) {
  if (!ts) return "—";
  const s = Math.floor(Date.now()/1000) - Math.floor(ts);
  if (s < 60)   return "just now";
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400)return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}
function statusColor(s) {
  return {pending:"var(--pending)",in_progress:"var(--in-progress)",blocked:"var(--blocked)",done:"var(--done)",cancelled:"var(--cancelled)"}[s]||"var(--text3)";
}
function progressBars(stats, total) {
  const segs = [{k:"done",c:"var(--done)"},{k:"in_progress",c:"var(--in-progress)"},{k:"pending",c:"var(--pending)"},{k:"blocked",c:"var(--blocked)"},{k:"cancelled",c:"var(--cancelled)"}];
  return segs.map(s=>`<div class="dept-progress-seg" style="width:${(stats[s.k]||0)/(total||1)*100}%;background:${s.c}"></div>`).join("");
}
function agentProgressBars(stats, total) {
  const segs = [{k:"done",c:"var(--done)"},{k:"in_progress",c:"var(--in-progress)"},{k:"pending",c:"var(--pending)"},{k:"blocked",c:"var(--blocked)"}];
  return segs.map(s=>`<div style="height:100%;width:${(stats[s.k]||0)/(total||1)*100}%;background:${s.c}"></div>`).join("");
}

// ================================================================
// View switching
// ================================================================
function switchView(view, dept, agent) {
  currentView = view;
  if (dept !== undefined) currentDept = dept;
  if (agent !== undefined) currentAgent = agent;

  const allViews = ["board","departments","dept-detail","agent-board"];
  allViews.forEach(v => document.getElementById(`view-${v}`).classList.toggle("active", v === view));

  // Nav active state
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  const navKey = (view === "board" || view === "agent-board") ? "board" : "departments";
  document.querySelector(`.nav-item[data-view="${navKey}"]`)?.classList.add("active");

  // KPI bar: show on board + agent-board, hide on department views
  const showKpi = view === "board" || view === "agent-board";
  document.getElementById("kpi-bar").classList.toggle("hidden", !showKpi);

  // Breadcrumb
  updateBreadcrumb();

  // Render
  if (view === "board") {
    renderBoard(null, "board", "sidebar", "sidebar-body");
    updateKpi(null);
  } else if (view === "departments") {
    renderDepartments();
  } else if (view === "dept-detail") {
    renderDeptDetail(currentDept);
  } else if (view === "agent-board") {
    renderBoard(currentAgent, "board-agent", "sidebar-agent", "sidebar-agent-body");
    updateKpi(currentAgent);
  }
}

function updateBreadcrumb() {
  const bar = document.getElementById("breadcrumb-bar");
  const bcDept = document.getElementById("bc-dept");
  const bcAgent = document.getElementById("bc-agent");
  const agentSep = document.querySelector(".bc-agent-sep");

  if (currentView === "board" || currentView === "departments") {
    bar.classList.add("hidden");
    return;
  }
  bar.classList.remove("hidden");

  if (currentView === "dept-detail") {
    const color = deptColor(currentDept);
    bcDept.innerHTML = `<span class="bc-current" style="display:flex;align-items:center;gap:6px"><span class="dept-color-dot" style="background:${color}"></span>${esc(currentDept)}</span>`;
    agentSep.classList.add("hidden");
    bcAgent.textContent = "";
  } else if (currentView === "agent-board") {
    const color = deptColor(currentDept||agentDept(currentAgent));
    bcDept.innerHTML = `<button class="bc-link" onclick="switchView('dept-detail','${esc(currentDept||agentDept(currentAgent))}')" style="display:inline-flex;align-items:center;gap:5px"><span class="dept-color-dot" style="background:${color}"></span>${esc(currentDept||agentDept(currentAgent))}</button>`;
    agentSep.classList.remove("hidden");
    bcAgent.textContent = currentAgent;
  }
}

// ================================================================
// KPI bar
// ================================================================
function updateKpi(agentFilter) {
  const tasks = Object.values(board).filter(t => agentFilter ? (t.assignee||"unassigned")===agentFilter : true);
  const c = {pending:0,in_progress:0,blocked:0,done:0};
  tasks.forEach(t => { const k=t.status; if(k in c) c[k]++; });
  document.getElementById("kpi-pending").textContent   = c.pending;
  document.getElementById("kpi-inprogress").textContent = c.in_progress;
  document.getElementById("kpi-blocked").textContent   = c.blocked;
  document.getElementById("kpi-done").textContent      = c.done;
  document.getElementById("kpi-total").textContent     = tasks.length;
  document.getElementById("kpi-sync").textContent      = `Synced ${timeAgo(Math.floor(Date.now()/1000))}`;
}

// ================================================================
// Board rendering
// ================================================================
function renderBoard(agentFilter, boardId, sidebarId, bodyId) {
  const el = document.getElementById(boardId);
  if (!el) return;
  const tasks = Object.values(board).filter(t => agentFilter ? (t.assignee||"unassigned")===agentFilter : true);
  const groups = {};
  COLUMNS.forEach(c => groups[c.key] = []);
  tasks.forEach(t => { const k=t.status||"pending"; if(!groups[k])groups[k]=[]; groups[k].push(t); });
  COLUMNS.forEach(c => groups[c.key].sort((a,b)=>(a.created_at||0)-(b.created_at||0)));
  const ctxKey = agentFilter ? "agent" : "board";

  el.innerHTML = COLUMNS.map(col => {
    const ct = groups[col.key]||[];
    return `<div class="column">
      <div class="col-header">
        <div class="col-dot" style="background:${col.color}"></div>
        <span class="col-title">${col.label}</span>
        <span class="col-count">${ct.length}</span>
      </div>
      <div class="col-body">
        ${ct.length ? ct.map(t => taskCard(t, ctxKey, sidebarId, bodyId)).join("") : '<div class="empty-col">No tasks</div>'}
      </div>
    </div>`;
  }).join("");

  // Reopen sidebar
  const sel = selectedTask[ctxKey];
  if (sel && board[sel]) populateSidebar(board[sel], sidebarId, bodyId);
}

function taskCard(task, ctxKey, sidebarId, bodyId) {
  const agent = task.assignee || "unassigned";
  const color = agentColor(agent);
  return `<div class="task-card" onclick="openTask('${esc(task.id)}','${ctxKey}','${sidebarId}','${bodyId}')">
    <div class="task-id">${esc(task.id.substring(0,10))}</div>
    <div class="task-title">${esc(task.title||"(no title)")}</div>
    <div class="task-footer">
      <span class="agent-tag" style="background:${color}18;color:${color}">${esc(agent)}</span>
      <span class="task-age">${timeAgo(task.created_at)}</span>
    </div>
  </div>`;
}

// ================================================================
// Sidebar
// ================================================================
function openTask(id, ctxKey, sidebarId, bodyId) {
  const task = board[id];
  if (!task) return;
  selectedTask[ctxKey] = id;
  populateSidebar(task, sidebarId, bodyId);
  document.getElementById(sidebarId).classList.remove("hidden");
}
function closeSidebar(id) {
  const k = id === "sidebar" ? "board" : "agent";
  selectedTask[k] = null;
  document.getElementById(id).classList.add("hidden");
}
function populateSidebar(task, sidebarId, bodyId) {
  const sc = statusColor(task.status);
  const ac = agentColor(task.assignee||"unassigned");
  const dept = agentDept(task.assignee||"unassigned");
  document.getElementById(bodyId).innerHTML = `
    <div class="detail-section">
      <div class="detail-label">Status</div>
      <div class="detail-value">
        <span class="status-chip" style="background:${sc}22;color:${sc};border:1px solid ${sc}44">${esc(task.status||"unknown")}</span>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Title</div>
      <div class="detail-value">${esc(task.title||"(no title)")}</div>
    </div>
    ${task.body?`<div class="detail-section"><div class="detail-label">Description</div><div class="detail-pre">${esc(task.body)}</div></div>`:""}
    <hr class="detail-divider">
    <div class="detail-section">
      <div class="detail-label">Assigned To</div>
      <div class="detail-value" style="display:flex;align-items:center;gap:8px">
        <span style="width:10px;height:10px;border-radius:3px;background:${ac};display:inline-block;flex-shrink:0"></span>
        <a href="#" class="agent-link" onclick="switchView('agent-board','${esc(dept)}','${esc(task.assignee||'')}');return false">${esc(task.assignee||"unassigned")}</a>
        <span style="color:var(--text3);font-size:11px">· ${esc(dept)}</span>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Created</div>
      <div class="detail-value">${task.created_at ? new Date(task.created_at*1000).toLocaleString() : "—"}</div>
    </div>
    ${task.started_at?`<div class="detail-section"><div class="detail-label">Started</div><div class="detail-value">${new Date(task.started_at*1000).toLocaleString()}</div></div>`:""}
    ${task.completed_at?`<div class="detail-section"><div class="detail-label">Completed</div><div class="detail-value">${new Date(task.completed_at*1000).toLocaleString()}</div></div>`:""}
    ${task.result?`<hr class="detail-divider"><div class="detail-section"><div class="detail-label">Result</div><div class="detail-pre">${esc(task.result)}</div></div>`:""}
    ${task.last_failure_error?`<hr class="detail-divider"><div class="detail-section"><div class="detail-label" style="color:var(--blocked)">Last Error</div><div class="detail-pre" style="color:var(--blocked)">${esc(task.last_failure_error)}</div></div>`:""}
    ${task.skills?`<hr class="detail-divider"><div class="detail-section"><div class="detail-label">Skills</div><div class="detail-value" style="font-size:12px">${esc(task.skills)}</div></div>`:""}
    <hr class="detail-divider">
    <div class="detail-section">
      <div class="detail-label">Task ID</div>
      <div class="detail-mono">${esc(task.id)}</div>
    </div>
    ${task.session_id?`<div class="detail-section"><div class="detail-label">Session ID</div><div class="detail-mono">${esc(task.session_id)}</div></div>`:""}
  `;
}

// ================================================================
// Departments view
// ================================================================
function buildDeptStats() {
  const STATUS_KEYS = ["pending","in_progress","blocked","done","cancelled"];
  const def = () => ({...Object.fromEntries(STATUS_KEYS.map(k=>[k,0])), total:0, last_active:0, agents:{}});
  const depts = {};
  for (const d of Object.keys(DEPT_CONFIG)) depts[d] = def();

  Object.values(board).forEach(t => {
    const agent = t.assignee||"unassigned";
    const dept = agentDept(agent);
    if (!depts[dept]) depts[dept] = def();
    const d = depts[dept];
    const s = t.status||"pending";
    if (s in d) d[s]++;
    d.total++;
    const ts = Math.max(t.last_heartbeat_at||0, t.started_at||0, t.completed_at||0, t.created_at||0);
    if (ts > d.last_active) d.last_active = ts;
    if (!d.agents[agent]) d.agents[agent] = {...Object.fromEntries(STATUS_KEYS.map(k=>[k,0])), total:0, is_active:false};
    const ag = d.agents[agent];
    if (s in ag) ag[s]++;
    ag.total++;
    if (s==="in_progress") ag.is_active = true;
  });
  return depts;
}

function renderDepartments() {
  const grid = document.getElementById("dept-grid");
  const depts = buildDeptStats();
  const total = Object.values(depts).reduce((a,d)=>a+d.total,0);
  document.getElementById("dept-section-title").textContent = `${Object.keys(DEPT_CONFIG).length} Departments · ${total} Tasks`;

  grid.innerHTML = Object.entries(DEPT_CONFIG).map(([name, cfg]) => {
    const s = depts[name]||{pending:0,in_progress:0,blocked:0,done:0,cancelled:0,total:0,last_active:0,agents:{}};
    const isActive = s.in_progress > 0;
    const isBlocked = !isActive && s.blocked > 0;
    let chipHtml;
    if (isActive)       chipHtml = `<span class="dept-status-chip" style="background:#16a34a20;color:#22c55e;border:1px solid #16a34a44">● Active</span>`;
    else if (isBlocked) chipHtml = `<span class="dept-status-chip" style="background:#dc262620;color:#ef4444;border:1px solid #dc262644">⊘ Blocked</span>`;
    else                chipHtml = `<span class="dept-status-chip" style="background:#47556920;color:#64748b;border:1px solid #47556944">· Idle</span>`;

    const agentRows = cfg.agents.map(a => {
      const as = s.agents[a]||{};
      return `<div class="agent-row" onclick="switchView('agent-board','${esc(name)}','${esc(a)}');event.stopPropagation()">
        <div class="agent-row-avatar" style="background:${cfg.color}">${esc(a[0].toUpperCase())}</div>
        <span class="agent-row-name">${esc(a)}</span>
        <div class="agent-row-stats">
          ${as.is_active ? '<span class="agent-active-pip" title="Active"></span>' : ""}
          <span class="agent-row-stat"><span class="agent-row-dot" style="background:var(--done)"></span>${as.done||0}</span>
          <span class="agent-row-stat"><span class="agent-row-dot" style="background:var(--blocked)"></span>${as.blocked||0}</span>
          <span class="agent-row-stat" style="color:var(--text3)">${as.total||0} total</span>
        </div>
      </div>`;
    }).join("");

    return `<div class="dept-card" onclick="switchView('dept-detail','${esc(name)}')">
      <div class="dept-card-top">
        <div class="dept-card-header">
          <div style="display:flex;align-items:flex-start;gap:12px;flex:1;min-width:0">
            <div class="dept-icon-wrap" style="background:${cfg.color}20;border:1px solid ${cfg.color}44">${cfg.icon||"⬡"}</div>
            <div>
              <div class="dept-name">${esc(name)}</div>
              <div class="dept-desc">${esc(cfg.description||"")}</div>
            </div>
          </div>
          ${chipHtml}
        </div>
        <div class="dept-progress">
          <div class="dept-progress-track">${progressBars(s, s.total)}</div>
          <div class="dept-kpis">
            <div class="dept-kpi"><div class="dept-kpi-num">${s.total}</div><div class="dept-kpi-label">Tasks</div></div>
            <div class="dept-kpi"><div class="dept-kpi-num">${s.done}</div><div class="dept-kpi-label">Done</div></div>
            <div class="dept-kpi"><div class="dept-kpi-num" style="color:var(--in-progress)">${s.in_progress}</div><div class="dept-kpi-label">Active</div></div>
            <div class="dept-kpi"><div class="dept-kpi-num" style="color:var(--blocked)">${s.blocked}</div><div class="dept-kpi-label">Blocked</div></div>
            <div class="dept-kpi"><div class="dept-kpi-num" style="color:var(--text3)">${timeAgo(s.last_active)}</div><div class="dept-kpi-label">Last Activity</div></div>
          </div>
        </div>
      </div>
      <div class="dept-card-agents">
        <div class="agents-label">${cfg.agents.length} Agent${cfg.agents.length!==1?"s":""}</div>
        ${agentRows}
      </div>
    </div>`;
  }).join("");
}

// ================================================================
// Department detail (agents grid)
// ================================================================
function renderDeptDetail(deptName) {
  const cfg = DEPT_CONFIG[deptName];
  if (!cfg) return;
  const depts = buildDeptStats();
  const s = depts[deptName]||{agents:{}};
  document.getElementById("dept-detail-title").innerHTML =
    `<span style="display:inline-flex;align-items:center;gap:8px">
      <span style="width:10px;height:10px;border-radius:50%;background:${cfg.color};display:inline-block"></span>
      ${esc(deptName)} — ${cfg.agents.length} Agent${cfg.agents.length!==1?"s":""}
    </span>`;

  const grid = document.getElementById("dept-agents-grid");
  grid.innerHTML = cfg.agents.map(agentName => {
    const as = s.agents[agentName]||{pending:0,in_progress:0,blocked:0,done:0,cancelled:0,total:0,is_active:false};
    const total = as.total||1;
    let chip;
    if (as.is_active)       chip = `<span class="agent-chip" style="background:#16a34a20;color:#22c55e;border:1px solid #16a34a44">● Active</span>`;
    else if (as.blocked>0)  chip = `<span class="agent-chip" style="background:#dc262620;color:#ef4444;border:1px solid #dc262644">⊘ Blocked</span>`;
    else                    chip = `<span class="agent-chip" style="background:#47556920;color:#64748b;border:1px solid #47556944">Idle</span>`;

    return `<div class="agent-card" onclick="switchView('agent-board','${esc(deptName)}','${esc(agentName)}')">
      <div class="agent-card-header">
        <div class="agent-avatar-lg" style="background:${cfg.color}">${esc(agentName[0].toUpperCase())}</div>
        <div style="flex:1;min-width:0">
          <div class="agent-card-name">${esc(agentName)}</div>
          <div class="agent-card-sub">${esc(deptName)} · ${as.total} task${as.total!==1?"s":""}</div>
        </div>
        ${chip}
      </div>
      <div class="agent-progress-track">${agentProgressBars(as, total)}</div>
      <div class="agent-stats-row">
        <div class="agent-stat-item"><div class="agent-stat-dot" style="background:var(--done)"></div><span class="agent-stat-num">${as.done}</span><span class="agent-stat-lbl">done</span></div>
        <div class="agent-stat-item"><div class="agent-stat-dot" style="background:var(--in-progress)"></div><span class="agent-stat-num">${as.in_progress}</span><span class="agent-stat-lbl">active</span></div>
        <div class="agent-stat-item"><div class="agent-stat-dot" style="background:var(--blocked)"></div><span class="agent-stat-num">${as.blocked}</span><span class="agent-stat-lbl">blocked</span></div>
        <div class="agent-stat-item"><div class="agent-stat-dot" style="background:var(--pending)"></div><span class="agent-stat-num">${as.pending}</span><span class="agent-stat-lbl">pending</span></div>
      </div>
    </div>`;
  }).join("");
}

// ================================================================
// SSE
// ================================================================
function setLive(on) {
  document.getElementById("live-dot").classList.toggle("live", on);
  document.getElementById("live-label").textContent = on ? "Live" : "Reconnecting";
}
function applyChanges() {
  if (currentView === "board")       renderBoard(null, "board", "sidebar", "sidebar-body"), updateKpi(null);
  else if (currentView === "departments") renderDepartments();
  else if (currentView === "dept-detail") renderDeptDetail(currentDept);
  else if (currentView === "agent-board") renderBoard(currentAgent, "board-agent", "sidebar-agent", "sidebar-agent-body"), updateKpi(currentAgent);
}
function connectSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource("/api/events");
  eventSource.onopen = () => setLive(true);
  eventSource.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === "snapshot") {
      board = {};
      (msg.data||[]).forEach(t => board[t.id] = t);
      applyChanges();
    } else if (msg.type === "update") {
      (msg.data?.changed||[]).forEach(t => { if(t._deleted) delete board[t.id]; else board[t.id]=t; });
      applyChanges();
      const n = (msg.data?.changed||[]).length;
      if (n) showToast(`${n} task${n>1?"s":""} updated`);
    } else if (msg.type === "task_update" && msg.data?.id) {
      board[msg.data.id] = msg.data;
      applyChanges();
    }
  };
  eventSource.onerror = () => { setLive(false); setTimeout(connectSSE, 5000); };
}

// ================================================================
// Toast
// ================================================================
function showToast(msg, dur=3000) {
  const el = Object.assign(document.createElement("div"), {className:"toast", textContent:msg});
  document.getElementById("toasts").appendChild(el);
  setTimeout(() => el.remove(), dur);
}

// ================================================================
// Init
// ================================================================
async function init() {
  await initUser();
  connectSSE();
  try {
    const r = await fetch("/api/board");
    const d = await r.json();
    if (!Object.keys(board).length) {
      board = {};
      Object.values(d.columns||{}).flat().forEach(t => board[t.id] = t);
      applyChanges();
    }
  } catch(e) { console.warn("REST fallback failed", e); }
}

init();
</script>
</body>
</html>
