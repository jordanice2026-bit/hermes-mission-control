<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hermes Mission Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14;
      --surface: #161922;
      --surface2: #1d2130;
      --border: #2a2d3a;
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --pending: #6b7280;
      --in-progress: #3b82f6;
      --blocked: #ef4444;
      --done: #22c55e;
      --cancelled: #4b5563;
      --radius: 10px;
      --card-radius: 8px;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
      gap: 16px;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; white-space: nowrap; }
    .logo-icon { font-size: 22px; }

    /* Nav tabs */
    .nav-tabs { display: flex; align-items: center; gap: 4px; }
    .nav-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      background: none; border: 1px solid transparent;
      border-radius: 8px; color: var(--muted);
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .nav-tab:hover { color: var(--text); background: var(--surface2); }
    .nav-tab.active {
      color: var(--text);
      background: var(--surface2);
      border-color: var(--border);
    }
    .nav-tab .tab-icon { font-size: 14px; }

    .header-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
    }
    .live-dot.live {
      background: var(--done);
      box-shadow: 0 0 6px var(--done);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .live-label { font-size: 12px; color: var(--muted); }
    .user-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 999px; padding: 4px 12px 4px 4px; font-size: 13px;
    }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: 700; overflow: hidden; flex-shrink: 0;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .logout-btn { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; }
    .logout-btn:hover { color: var(--text); }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; align-items: center; gap: 20px;
      padding: 8px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
      font-size: 13px;
    }
    .stat { display: flex; align-items: center; gap: 6px; }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .stat-num { font-weight: 700; font-size: 15px; }
    .stat-label { color: var(--muted); }
    .last-sync { margin-left: auto; color: var(--muted); font-size: 12px; white-space: nowrap; }

    /* ── Agent detail sub-header ── */
    .agent-subheader {
      display: flex; align-items: center; gap: 14px;
      padding: 0 24px;
      height: 48px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface2);
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      background: none; border: none; color: var(--muted);
      font-size: 13px; cursor: pointer; padding: 0;
    }
    .back-btn:hover { color: var(--text); }
    .agent-subheader-name {
      display: flex; align-items: center; gap: 10px;
      font-weight: 600; font-size: 15px;
    }
    .agent-subheader-avatar {
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .agent-active-badge {
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 999px; background: rgba(34,197,94,0.15);
      color: var(--done); border: 1px solid rgba(34,197,94,0.3);
      letter-spacing: 0.04em;
    }
    .divider { width: 1px; height: 20px; background: var(--border); }

    /* ── Views ── */
    .view { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .view.active { display: flex; }

    /* ── Main (board + sidebar) ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Kanban board ── */
    .board {
      display: flex; gap: 16px;
      padding: 20px 24px;
      overflow-x: auto; flex: 1;
      align-items: flex-start;
    }
    .column {
      flex: 0 0 270px; min-width: 270px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); display: flex;
      flex-direction: column; max-height: 100%;
    }
    .col-header {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .col-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .col-title { font-weight: 600; font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; }
    .col-count {
      margin-left: auto; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 1px 8px; font-size: 11px; font-weight: 600; color: var(--muted);
    }
    .col-body {
      flex: 1; overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .col-body::-webkit-scrollbar { width: 4px; }
    .col-body::-webkit-scrollbar-track { background: transparent; }
    .col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Task card ── */
    .task-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--card-radius); padding: 12px;
      cursor: pointer; transition: border-color 0.15s, transform 0.1s;
    }
    .task-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .task-id { font-size: 10px; font-family: monospace; color: var(--muted); margin-bottom: 6px; }
    .task-title {
      font-size: 13px; font-weight: 500; line-height: 1.45; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .task-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .assignee-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25);
      border-radius: 999px; padding: 2px 8px;
      font-size: 11px; font-weight: 600; color: var(--accent-hover);
      max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .task-age { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .empty-col { text-align: center; padding: 24px 12px; color: var(--muted); font-size: 12px; }

    /* ── Sidebar ── */
    .sidebar {
      width: 360px; flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--surface); display: flex;
      flex-direction: column; overflow: hidden; transition: width 0.2s;
    }
    .sidebar.hidden { width: 0; border-left: none; }
    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .sidebar-title { font-weight: 600; font-size: 14px; }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; }
    .close-btn:hover { color: var(--text); }
    .sidebar-body { flex: 1; overflow-y: auto; padding: 16px; }
    .detail-field { margin-bottom: 16px; }
    .detail-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .detail-value { font-size: 13px; line-height: 1.5; }
    .status-pill {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    }

    /* ── Agents grid view ── */
    .agents-container {
      flex: 1; overflow-y: auto; padding: 24px;
    }
    .agents-container::-webkit-scrollbar { width: 6px; }
    .agents-container::-webkit-scrollbar-track { background: transparent; }
    .agents-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      max-width: 1200px;
    }
    .agents-title {
      font-size: 12px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    /* ── Agent card ── */
    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .agent-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .agent-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .agent-avatar {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .agent-card-info { flex: 1; min-width: 0; }
    .agent-card-name {
      font-size: 14px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .agent-card-meta { font-size: 11px; color: var(--muted); }
    .agent-status-badge {
      font-size: 10px; font-weight: 700; padding: 3px 8px;
      border-radius: 999px; letter-spacing: 0.05em; text-transform: uppercase; flex-shrink: 0;
    }
    .badge-active { background: rgba(34,197,94,0.15); color: var(--done); border: 1px solid rgba(34,197,94,0.3); }
    .badge-blocked { background: rgba(239,68,68,0.12); color: var(--blocked); border: 1px solid rgba(239,68,68,0.25); }
    .badge-idle { background: rgba(107,114,128,0.15); color: var(--muted); border: 1px solid rgba(107,114,128,0.25); }
    .badge-done { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }

    /* Progress bar */
    .progress-bar-wrap { margin-bottom: 14px; }
    .progress-bar-track {
      height: 5px; background: var(--border); border-radius: 3px; overflow: hidden;
      display: flex;
    }
    .progress-segment { height: 100%; transition: width 0.3s; }

    /* Task mini-stats */
    .agent-task-stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .task-stat-item { display: flex; align-items: center; gap: 5px; font-size: 12px; }
    .task-stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .task-stat-num { font-weight: 700; }
    .task-stat-label { color: var(--muted); }

    /* ── Loading / Toast ── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      flex: 1; flex-direction: column; gap: 12px; color: var(--muted); font-size: 14px;
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px; z-index: 9999;
    }
    .toast {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 16px; font-size: 13px;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

    /* Scrollbars */
    .board::-webkit-scrollbar { height: 6px; }
    .board::-webkit-scrollbar-track { background: transparent; }
    .board::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <span class="logo-icon">🚀</span>
    Mission Control
  </div>

  <nav class="nav-tabs">
    <button class="nav-tab active" data-view="board" onclick="switchView('board')">
      <span class="tab-icon">📋</span> Board
    </button>
    <button class="nav-tab" data-view="agents" onclick="switchView('agents')">
      <span class="tab-icon">🤖</span> Agents
    </button>
  </nav>

  <div class="header-right">
    <div class="live-dot" id="live-dot"></div>
    <span class="live-label" id="live-label">Connecting…</span>
    <div class="user-pill">
      <div class="user-avatar" id="user-avatar"></div>
      <span id="user-name">…</span>
      <button class="logout-btn" onclick="location.href='/auth/logout'">Sign out</button>
    </div>
  </div>
</header>

<!-- Stats bar (shown on board + agent-detail views) -->
<div class="stats-bar" id="stats-bar">
  <div class="stat">
    <div class="stat-dot" style="background:var(--pending)"></div>
    <span class="stat-num" id="stat-pending">0</span>
    <span class="stat-label">Pending</span>
  </div>
  <div class="stat">
    <div class="stat-dot" style="background:var(--in-progress)"></div>
    <span class="stat-num" id="stat-inprogress">0</span>
    <span class="stat-label">In Progress</span>
  </div>
  <div class="stat">
    <div class="stat-dot" style="background:var(--blocked)"></div>
    <span class="stat-num" id="stat-blocked">0</span>
    <span class="stat-label">Blocked</span>
  </div>
  <div class="stat">
    <div class="stat-dot" style="background:var(--done)"></div>
    <span class="stat-num" id="stat-done">0</span>
    <span class="stat-label">Done</span>
  </div>
  <div class="stat">
    <span class="stat-num" id="stat-total" style="color:var(--muted)">0</span>
    <span class="stat-label">Total</span>
  </div>
  <span class="last-sync" id="last-sync">Never synced</span>
</div>

<!-- ═══ VIEW: Board ═══ -->
<div class="view active" id="view-board">
  <div class="main">
    <div class="board" id="board">
      <div class="loading"><div class="spinner"></div>Loading board…</div>
    </div>
    <div class="sidebar hidden" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Task Detail</span>
        <button class="close-btn" onclick="closeSidebar('sidebar')">×</button>
      </div>
      <div class="sidebar-body" id="sidebar-body"></div>
    </div>
  </div>
</div>

<!-- ═══ VIEW: Agents ═══ -->
<div class="view" id="view-agents">
  <div class="agents-container">
    <div class="agents-title" id="agents-title">Agents</div>
    <div class="agents-grid" id="agents-grid">
      <div class="loading"><div class="spinner"></div>Loading agents…</div>
    </div>
  </div>
</div>

<!-- ═══ VIEW: Agent Detail ═══ -->
<div class="view" id="view-agent-detail">
  <!-- Sub-header with back button + agent identity -->
  <div class="agent-subheader" id="agent-subheader">
    <button class="back-btn" onclick="switchView('agents')">← Agents</button>
    <div class="divider"></div>
    <div class="agent-subheader-name" id="agent-subheader-name"></div>
  </div>
  <div class="main">
    <div class="board" id="board-agent">
      <div class="loading"><div class="spinner"></div></div>
    </div>
    <div class="sidebar hidden" id="sidebar-agent">
      <div class="sidebar-header">
        <span class="sidebar-title">Task Detail</span>
        <button class="close-btn" onclick="closeSidebar('sidebar-agent')">×</button>
      </div>
      <div class="sidebar-body" id="sidebar-agent-body"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
// ================================================================
// State
// ================================================================
let board = {};            // task_id → task
let eventSource = null;
let currentView = 'board'; // 'board' | 'agents' | 'agent-detail'
let currentAgent = null;   // agent name when in agent-detail
let selectedTask = { board: null, agent: null }; // selected task per context

// ================================================================
// Auth
// ================================================================
async function initUser() {
  try {
    const r = await fetch('/auth/me');
    const d = await r.json();
    if (!d.authenticated) { location.href = '/login'; return; }
    const u = d.user;
    document.getElementById('user-name').textContent = u.name || u.email;
    const av = document.getElementById('user-avatar');
    if (u.picture) {
      av.innerHTML = `<img src="${u.picture}" alt="${escHtml(u.name)}"/>`;
    } else {
      av.textContent = (u.name || u.email)[0].toUpperCase();
    }
  } catch(e) { console.error(e); }
}

// ================================================================
// View switching
// ================================================================
function switchView(view, agentName) {
  currentView = view;
  currentAgent = agentName || null;

  // Toggle views
  ['board','agents','agent-detail'].forEach(v => {
    document.getElementById(`view-${v}`).classList.toggle('active', v === view);
  });

  // Stats bar: show on board and agent-detail, hide on agents grid
  const statsBar = document.getElementById('stats-bar');
  statsBar.style.display = (view === 'agents') ? 'none' : '';

  // Nav tab active state
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const activeTab = view === 'board' ? 'board' : 'agents';
  document.querySelector(`.nav-tab[data-view="${activeTab}"]`).classList.add('active');

  // Render the target view
  if (view === 'board') {
    renderBoard(null, 'board', 'sidebar', 'sidebar-body');
  } else if (view === 'agents') {
    renderAgents();
  } else if (view === 'agent-detail' && agentName) {
    renderAgentDetailHeader(agentName);
    renderBoard(agentName, 'board-agent', 'sidebar-agent', 'sidebar-agent-body');
    updateStats(agentName);
  }
}

// ================================================================
// Helpers
// ================================================================
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(ts) {
  if (!ts) return '';
  const secs = Math.floor(Date.now() / 1000) - Math.floor(ts);
  if (secs < 60)    return 'just now';
  if (secs < 3600)  return `${Math.floor(secs/60)}m ago`;
  if (secs < 86400) return `${Math.floor(secs/3600)}h ago`;
  return `${Math.floor(secs/86400)}d ago`;
}

function statusColor(s) {
  return { pending:'var(--pending)', in_progress:'var(--in-progress)', blocked:'var(--blocked)', done:'var(--done)', cancelled:'var(--cancelled)' }[s] || 'var(--muted)';
}

// Deterministic color per agent name
function agentColor(name) {
  const palette = ['#6366f1','#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#0ea5e9','#f97316','#a855f7','#14b8a6'];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = ((h * 31) + name.charCodeAt(i)) >>> 0;
  return palette[h % palette.length];
}

// ================================================================
// Board rendering (shared between board view + agent detail)
// ================================================================
const COLUMNS = [
  { key: 'pending',     label: 'Pending',     color: 'var(--pending)' },
  { key: 'in_progress', label: 'In Progress', color: 'var(--in-progress)' },
  { key: 'blocked',     label: 'Blocked',     color: 'var(--blocked)' },
  { key: 'done',        label: 'Done',        color: 'var(--done)' },
  { key: 'cancelled',   label: 'Cancelled',   color: 'var(--cancelled)' },
];

function renderBoard(agentFilter, boardId, sidebarId, sidebarBodyId) {
  const boardEl = document.getElementById(boardId);
  if (!boardEl) return;

  const tasks = Object.values(board).filter(t =>
    agentFilter ? (t.assignee || 'unassigned') === agentFilter : true
  );

  const groups = {};
  COLUMNS.forEach(c => groups[c.key] = []);
  tasks.forEach(t => {
    const k = t.status || 'pending';
    if (!groups[k]) groups[k] = [];
    groups[k].push(t);
  });
  COLUMNS.forEach(c => groups[c.key].sort((a,b) => (a.created_at||0) - (b.created_at||0)));

  const ctxKey = agentFilter ? 'agent' : 'board';

  boardEl.innerHTML = COLUMNS.map(col => {
    const colTasks = groups[col.key] || [];
    return `
      <div class="column">
        <div class="col-header">
          <div class="col-dot" style="background:${col.color}"></div>
          <span class="col-title">${col.label}</span>
          <span class="col-count">${colTasks.length}</span>
        </div>
        <div class="col-body">
          ${colTasks.length ? colTasks.map(t => renderTaskCard(t, ctxKey, sidebarId, sidebarBodyId)).join('') : '<div class="empty-col">No tasks</div>'}
        </div>
      </div>`;
  }).join('');

  // Update stats bar if this is the active/relevant view
  if (!agentFilter && currentView === 'board') updateStats(null);
  if (agentFilter && currentView === 'agent-detail') updateStats(agentFilter);

  // Reopen sidebar if task still exists
  const sel = selectedTask[ctxKey];
  if (sel && board[sel]) populateSidebar(board[sel], sidebarId, sidebarBodyId);
}

function renderTaskCard(task, ctxKey, sidebarId, sidebarBodyId) {
  const assignee = task.assignee || 'unassigned';
  const color = agentColor(assignee);
  return `
    <div class="task-card" onclick="openTask('${escHtml(task.id)}','${ctxKey}','${sidebarId}','${sidebarBodyId}')">
      <div class="task-id">${escHtml(task.id.substring(0,12))}</div>
      <div class="task-title">${escHtml(task.title || '(no title)')}</div>
      <div class="task-footer">
        <span class="assignee-badge" style="background:${color}18;border-color:${color}40;color:${color}">
          ${escHtml(assignee)}
        </span>
        <span class="task-age">${timeAgo(task.created_at)}</span>
      </div>
    </div>`;
}

// ================================================================
// Stats bar
// ================================================================
function updateStats(agentFilter) {
  const tasks = Object.values(board).filter(t =>
    agentFilter ? (t.assignee || 'unassigned') === agentFilter : true
  );
  const byStatus = { pending:0, in_progress:0, blocked:0, done:0 };
  tasks.forEach(t => { const k = t.status; if (k in byStatus) byStatus[k]++; });
  document.getElementById('stat-pending').textContent   = byStatus.pending;
  document.getElementById('stat-inprogress').textContent = byStatus.in_progress;
  document.getElementById('stat-blocked').textContent   = byStatus.blocked;
  document.getElementById('stat-done').textContent      = byStatus.done;
  document.getElementById('stat-total').textContent     = tasks.length;
  document.getElementById('last-sync').textContent      = `Synced just now`;
}

// ================================================================
// Sidebar
// ================================================================
function openTask(id, ctxKey, sidebarId, sidebarBodyId) {
  const task = board[id];
  if (!task) return;
  selectedTask[ctxKey] = id;
  populateSidebar(task, sidebarId, sidebarBodyId);
  document.getElementById(sidebarId).classList.remove('hidden');
}

function closeSidebar(sidebarId) {
  const ctxKey = sidebarId === 'sidebar' ? 'board' : 'agent';
  selectedTask[ctxKey] = null;
  document.getElementById(sidebarId).classList.add('hidden');
}

function populateSidebar(task, sidebarId, bodyId) {
  const color = statusColor(task.status);
  const agColor = agentColor(task.assignee || 'unassigned');
  document.getElementById(bodyId).innerHTML = `
    <div class="detail-field">
      <div class="detail-label">Task ID</div>
      <div class="detail-value" style="font-family:monospace;font-size:12px;color:var(--muted)">${escHtml(task.id)}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">Status</div>
      <div class="detail-value">
        <span class="status-pill" style="background:${color}20;color:${color};border:1px solid ${color}40">
          ${escHtml(task.status || 'unknown')}
        </span>
      </div>
    </div>
    <div class="detail-field">
      <div class="detail-label">Title</div>
      <div class="detail-value">${escHtml(task.title || '(no title)')}</div>
    </div>
    ${task.body ? `<div class="detail-field">
      <div class="detail-label">Description</div>
      <div class="detail-value" style="white-space:pre-wrap;font-size:12px;color:#9ca3af">${escHtml(task.body)}</div>
    </div>` : ''}
    <div class="detail-field">
      <div class="detail-label">Assignee</div>
      <div class="detail-value">
        <span style="display:inline-flex;align-items:center;gap:6px">
          <span style="width:10px;height:10px;border-radius:3px;background:${agColor};display:inline-block"></span>
          <a href="#" onclick="switchView('agent-detail','${escHtml(task.assignee||'unassigned')}');return false"
             style="color:${agColor};text-decoration:none;font-weight:600">
            ${escHtml(task.assignee || 'unassigned')}
          </a>
        </span>
      </div>
    </div>
    ${task.priority != null ? `<div class="detail-field">
      <div class="detail-label">Priority</div>
      <div class="detail-value">${task.priority}</div>
    </div>` : ''}
    <div class="detail-field">
      <div class="detail-label">Created</div>
      <div class="detail-value">${task.created_at ? new Date(task.created_at*1000).toLocaleString() : '—'}</div>
    </div>
    ${task.started_at ? `<div class="detail-field">
      <div class="detail-label">Started</div>
      <div class="detail-value">${new Date(task.started_at*1000).toLocaleString()}</div>
    </div>` : ''}
    ${task.completed_at ? `<div class="detail-field">
      <div class="detail-label">Completed</div>
      <div class="detail-value">${new Date(task.completed_at*1000).toLocaleString()}</div>
    </div>` : ''}
    ${task.result ? `<div class="detail-field">
      <div class="detail-label">Result</div>
      <div class="detail-value" style="white-space:pre-wrap;font-size:12px;color:#9ca3af">${escHtml(task.result)}</div>
    </div>` : ''}
    ${task.last_failure_error ? `<div class="detail-field">
      <div class="detail-label" style="color:var(--blocked)">Last Error</div>
      <div class="detail-value" style="white-space:pre-wrap;font-size:12px;color:var(--blocked)">${escHtml(task.last_failure_error)}</div>
    </div>` : ''}
    ${task.skills ? `<div class="detail-field">
      <div class="detail-label">Skills</div>
      <div class="detail-value" style="font-size:12px">${escHtml(task.skills)}</div>
    </div>` : ''}
    ${task.session_id ? `<div class="detail-field">
      <div class="detail-label">Session ID</div>
      <div class="detail-value" style="font-family:monospace;font-size:11px;color:var(--muted)">${escHtml(task.session_id)}</div>
    </div>` : ''}
  `;
}

// ================================================================
// Agents view
// ================================================================
async function renderAgents() {
  const grid = document.getElementById('agents-grid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  // Build agents from board state (no extra fetch needed)
  const agentsMap = {};
  Object.values(board).forEach(t => {
    const name = t.assignee || 'unassigned';
    if (!agentsMap[name]) agentsMap[name] = { pending:0, in_progress:0, blocked:0, done:0, cancelled:0, total:0, last_active:0 };
    const s = t.status || 'pending';
    if (s in agentsMap[name]) agentsMap[name][s]++;
    agentsMap[name].total++;
    const ts = Math.max(t.last_heartbeat_at||0, t.started_at||0, t.completed_at||0, t.created_at||0);
    if (ts > agentsMap[name].last_active) agentsMap[name].last_active = ts;
  });

  const agents = Object.entries(agentsMap)
    .sort((a,b) => b[1].total - a[1].total)
    .map(([name, stats]) => ({ name, stats, is_active: stats.in_progress > 0 }));

  document.getElementById('agents-title').textContent = `${agents.length} Agent${agents.length !== 1 ? 's' : ''}`;

  if (!agents.length) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:40px 0">No agents found. Tasks will appear here once your Kanban board syncs.</div>';
    return;
  }

  grid.innerHTML = agents.map(a => renderAgentCard(a)).join('');
}

function renderAgentCard(agent) {
  const s = agent.stats;
  const color = agentColor(agent.name);
  const initial = (agent.name[0] || '?').toUpperCase();
  const total = s.total || 1;

  // Progress bar segments
  const segments = [
    { key: 'done',        color: 'var(--done)' },
    { key: 'in_progress', color: 'var(--in-progress)' },
    { key: 'pending',     color: 'var(--pending)' },
    { key: 'blocked',     color: 'var(--blocked)' },
    { key: 'cancelled',   color: 'var(--cancelled)' },
  ];
  const bars = segments.map(seg =>
    `<div class="progress-segment" style="width:${(s[seg.key]||0)/total*100}%;background:${seg.color}"></div>`
  ).join('');

  // Status badge
  let badge, badgeClass;
  if (agent.is_active) { badge = '● ACTIVE'; badgeClass = 'badge-active'; }
  else if (s.blocked > 0) { badge = '⊘ BLOCKED'; badgeClass = 'badge-blocked'; }
  else if (s.pending > 0) { badge = '· IDLE'; badgeClass = 'badge-idle'; }
  else { badge = '✓ DONE'; badgeClass = 'badge-done'; }

  return `
    <div class="agent-card" onclick="switchView('agent-detail','${escHtml(agent.name)}')">
      <div class="agent-card-header">
        <div class="agent-avatar" style="background:${color}">${escHtml(initial)}</div>
        <div class="agent-card-info">
          <div class="agent-card-name">${escHtml(agent.name)}</div>
          <div class="agent-card-meta">${s.total} task${s.total !== 1 ? 's' : ''} · ${timeAgo(s.last_active)}</div>
        </div>
        <span class="agent-status-badge ${badgeClass}">${badge}</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-track">${bars}</div>
      </div>
      <div class="agent-task-stats">
        <div class="task-stat-item"><div class="task-stat-dot" style="background:var(--done)"></div><span class="task-stat-num">${s.done}</span><span class="task-stat-label">done</span></div>
        <div class="task-stat-item"><div class="task-stat-dot" style="background:var(--in-progress)"></div><span class="task-stat-num">${s.in_progress}</span><span class="task-stat-label">active</span></div>
        <div class="task-stat-item"><div class="task-stat-dot" style="background:var(--blocked)"></div><span class="task-stat-num">${s.blocked}</span><span class="task-stat-label">blocked</span></div>
        <div class="task-stat-item"><div class="task-stat-dot" style="background:var(--pending)"></div><span class="task-stat-num">${s.pending}</span><span class="task-stat-label">pending</span></div>
      </div>
    </div>`;
}

// ================================================================
// Agent detail sub-header
// ================================================================
function renderAgentDetailHeader(name) {
  const color = agentColor(name);
  const tasks = Object.values(board).filter(t => (t.assignee || 'unassigned') === name);
  const isActive = tasks.some(t => t.status === 'in_progress');
  const el = document.getElementById('agent-subheader-name');
  el.innerHTML = `
    <div class="agent-subheader-avatar" style="background:${color}">${escHtml(name[0].toUpperCase())}</div>
    <span>${escHtml(name)}</span>
    ${isActive ? '<span class="agent-active-badge">● ACTIVE</span>' : ''}
    <span style="color:var(--muted);font-size:12px;font-weight:400">${tasks.length} task${tasks.length!==1?'s':''}</span>
  `;
}

// ================================================================
// SSE
// ================================================================
function setLive(connected) {
  const dot = document.getElementById('live-dot');
  const label = document.getElementById('live-label');
  dot.classList.toggle('live', connected);
  label.textContent = connected ? 'Live' : 'Reconnecting…';
}

function applyUpdate(changed) {
  let any = false;
  (changed || []).forEach(t => {
    if (t._deleted) { delete board[t.id]; any = true; }
    else { board[t.id] = t; any = true; }
  });
  if (!any) return;

  if (currentView === 'board') renderBoard(null, 'board', 'sidebar', 'sidebar-body');
  else if (currentView === 'agents') renderAgents();
  else if (currentView === 'agent-detail' && currentAgent) {
    renderAgentDetailHeader(currentAgent);
    renderBoard(currentAgent, 'board-agent', 'sidebar-agent', 'sidebar-agent-body');
  }
}

function connectSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource('/api/events');
  eventSource.onopen = () => setLive(true);
  eventSource.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'snapshot') {
      board = {};
      (msg.data || []).forEach(t => board[t.id] = t);
      applyUpdate(null);
      // Force a fresh render on current view
      applyUpdate([]);
      if (currentView === 'board') renderBoard(null, 'board', 'sidebar', 'sidebar-body');
      else if (currentView === 'agents') renderAgents();
      else if (currentView === 'agent-detail' && currentAgent) {
        renderAgentDetailHeader(currentAgent);
        renderBoard(currentAgent, 'board-agent', 'sidebar-agent', 'sidebar-agent-body');
      }
      updateStats(currentView === 'agent-detail' ? currentAgent : null);
    } else if (msg.type === 'update') {
      const changed = msg.data?.changed || [];
      applyUpdate(changed);
      if (changed.length) showToast(`↻ ${changed.length} task${changed.length>1?'s':''} updated`);
    } else if (msg.type === 'task_update') {
      if (msg.data?.id) applyUpdate([msg.data]);
    }
  };
  eventSource.onerror = () => { setLive(false); setTimeout(connectSSE, 5000); };
}

// ================================================================
// Toast
// ================================================================
function showToast(msg, dur=3000) {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), dur);
}

// ================================================================
// Init
// ================================================================
async function init() {
  await initUser();
  connectSSE();
  // Fallback REST fetch
  try {
    const r = await fetch('/api/board');
    const d = await r.json();
    if (!Object.keys(board).length) {
      board = {};
      Object.values(d.columns || {}).flat().forEach(t => board[t.id] = t);
      renderBoard(null, 'board', 'sidebar', 'sidebar-body');
      updateStats(null);
    }
  } catch(e) { console.warn('REST fallback failed', e); }
}

init();
</script>
