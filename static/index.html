<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hermes Mission Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14;
      --surface: #161922;
      --surface2: #1d2130;
      --border: #2a2d3a;
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --pending: #6b7280;
      --in-progress: #3b82f6;
      --blocked: #ef4444;
      --done: #22c55e;
      --cancelled: #4b5563;
      --radius: 10px;
      --card-radius: 8px;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
    .logo-icon { font-size: 22px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--done);
      box-shadow: 0 0 6px var(--done);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .live-label { font-size: 12px; color: var(--muted); }
    .user-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 999px; padding: 4px 12px 4px 4px;
      font-size: 13px; cursor: pointer;
    }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      object-fit: cover; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; }
    .logout-btn {
      background: none; border: none; color: var(--muted);
      font-size: 12px; cursor: pointer; padding: 0;
    }
    .logout-btn:hover { color: var(--text); }

    /* ---- Stats bar ---- */
    .stats-bar {
      display: flex; align-items: center; gap: 24px;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
      font-size: 13px;
    }
    .stat { display: flex; align-items: center; gap: 6px; }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
    .stat-num { font-weight: 700; font-size: 15px; }
    .stat-label { color: var(--muted); }
    .last-sync { margin-left: auto; color: var(--muted); font-size: 12px; }

    /* ---- Main layout ---- */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ---- Kanban board ---- */
    .board {
      display: flex;
      gap: 16px;
      padding: 20px 24px;
      overflow-x: auto;
      flex: 1;
      align-items: flex-start;
    }

    .column {
      flex: 0 0 280px;
      min-width: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      max-height: 100%;
    }
    .col-header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .col-dot { width: 10px; height: 10px; border-radius: 50%; }
    .col-title { font-weight: 600; font-size: 13px; letter-spacing: 0.02em; text-transform: uppercase; }
    .col-count {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
    }
    .col-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .col-body::-webkit-scrollbar { width: 4px; }
    .col-body::-webkit-scrollbar-track { background: transparent; }
    .col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ---- Task card ---- */
    .task-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .task-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .task-id {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .task-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .task-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .assignee-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-hover);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .task-age { font-size: 11px; color: var(--muted); }

    /* ---- Empty state ---- */
    .empty-col {
      text-align: center;
      padding: 24px 12px;
      color: var(--muted);
      font-size: 12px;
    }

    /* ---- Sidebar (task detail) ---- */
    .sidebar {
      width: 360px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.2s;
    }
    .sidebar.hidden { width: 0; border-left: none; overflow: hidden; }
    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-title { font-weight: 600; font-size: 14px; }
    .close-btn {
      background: none; border: none; color: var(--muted);
      font-size: 18px; cursor: pointer; padding: 0; line-height: 1;
    }
    .close-btn:hover { color: var(--text); }
    .sidebar-body { flex: 1; overflow-y: auto; padding: 16px; }
    .detail-field { margin-bottom: 16px; }
    .detail-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .detail-value { font-size: 13px; line-height: 1.5; }
    .status-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ---- Toast ---- */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 9999;
    }
    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    /* ---- Loading overlay ---- */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      flex-direction: column;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Scrollbar global ---- */
    .board::-webkit-scrollbar { height: 6px; }
    .board::-webkit-scrollbar-track { background: transparent; }
    .board::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <span class="logo-icon">🚀</span>
    Mission Control
  </div>
  <div class="header-right">
    <div class="live-dot" id="live-dot" style="background:var(--muted)"></div>
    <span class="live-label" id="live-label">Connecting…</span>
    <div class="user-pill" id="user-pill">
      <div class="user-avatar" id="user-avatar"></div>
      <span id="user-name">…</span>
      <button class="logout-btn" onclick="location.href='/auth/logout'">Sign out</button>
    </div>
  </div>
</header>

<!-- Stats bar -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat-dot" style="background:var(--pending)"></div>
    <span class="stat-num" id="stat-pending">0</span>
    <span class="stat-label">Pending</span>
  </div>
  <div class="stat">
    <div class="stat-dot" style="background:var(--in-progress)"></div>
    <span class="stat-num" id="stat-inprogress">0</span>
    <span class="stat-label">In Progress</span>
  </div>
  <div class="stat">
    <div class="stat-dot" style="background:var(--blocked)"></div>
    <span class="stat-num" id="stat-blocked">0</span>
    <span class="stat-label">Blocked</span>
  </div>
  <div class="stat">
    <div class="stat-dot" style="background:var(--done)"></div>
    <span class="stat-num" id="stat-done">0</span>
    <span class="stat-label">Done</span>
  </div>
  <div class="stat">
    <span class="stat-num" id="stat-total" style="color:var(--muted)">0</span>
    <span class="stat-label">Total Tasks</span>
  </div>
  <span class="last-sync" id="last-sync">Never synced</span>
</div>

<!-- Main -->
<div class="main">
  <div class="board" id="board">
    <div class="loading">
      <div class="spinner"></div>
      Loading board…
    </div>
  </div>

  <!-- Sidebar detail panel -->
  <div class="sidebar hidden" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Task Detail</span>
      <button class="close-btn" onclick="closeSidebar()">×</button>
    </div>
    <div class="sidebar-body" id="sidebar-body"></div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<script>
// ============================================================
// Config
// ============================================================
const COLUMNS = [
  { key: 'pending',     label: 'Pending',     color: 'var(--pending)' },
  { key: 'in_progress', label: 'In Progress', color: 'var(--in-progress)' },
  { key: 'blocked',     label: 'Blocked',     color: 'var(--blocked)' },
  { key: 'done',        label: 'Done',        color: 'var(--done)' },
  { key: 'cancelled',   label: 'Cancelled',   color: 'var(--cancelled)' },
];

// ============================================================
// State
// ============================================================
let board = {};   // task_id → task
let eventSource = null;
let selectedTaskId = null;

// ============================================================
// Auth / user
// ============================================================
async function initUser() {
  try {
    const r = await fetch('/auth/me');
    const d = await r.json();
    if (!d.authenticated) { location.href = '/login'; return; }
    const u = d.user;
    document.getElementById('user-name').textContent = u.name || u.email;
    const av = document.getElementById('user-avatar');
    if (u.picture) {
      av.innerHTML = `<img src="${u.picture}" alt="${u.name}"/>`;
    } else {
      av.textContent = (u.name || u.email)[0].toUpperCase();
    }
  } catch(e) { console.error(e); }
}

// ============================================================
// Board rendering
// ============================================================
function timeAgo(ts) {
  if (!ts) return '';
  const secs = Math.floor(Date.now() / 1000) - Math.floor(ts);
  if (secs < 60) return 'just now';
  if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
  if (secs < 86400) return `${Math.floor(secs/3600)}h ago`;
  return `${Math.floor(secs/86400)}d ago`;
}

function statusColor(s) {
  return {
    pending: 'var(--pending)',
    in_progress: 'var(--in-progress)',
    blocked: 'var(--blocked)',
    done: 'var(--done)',
    cancelled: 'var(--cancelled)',
  }[s] || 'var(--muted)';
}

function renderTask(task) {
  const age = timeAgo(task.created_at);
  const assignee = task.assignee || 'unassigned';
  return `
    <div class="task-card" data-id="${task.id}" onclick="openTask('${task.id}')">
      <div class="task-id">${task.id.substring(0, 12)}</div>
      <div class="task-title">${escHtml(task.title || '(no title)')}</div>
      <div class="task-footer">
        <span class="assignee-badge">⬡ ${escHtml(assignee)}</span>
        <span class="task-age">${age}</span>
      </div>
    </div>`;
}

function renderBoard() {
  const boardEl = document.getElementById('board');

  // Group tasks by status
  const groups = {};
  COLUMNS.forEach(c => groups[c.key] = []);
  Object.values(board).forEach(t => {
    const key = t.status || 'pending';
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });

  // Sort each column by created_at
  COLUMNS.forEach(c => {
    groups[c.key].sort((a,b) => (a.created_at||0) - (b.created_at||0));
  });

  boardEl.innerHTML = COLUMNS.map(col => {
    const tasks = groups[col.key] || [];
    return `
      <div class="column" id="col-${col.key}">
        <div class="col-header">
          <div class="col-dot" style="background:${col.color}"></div>
          <span class="col-title">${col.label}</span>
          <span class="col-count">${tasks.length}</span>
        </div>
        <div class="col-body">
          ${tasks.length ? tasks.map(renderTask).join('') : '<div class="empty-col">No tasks</div>'}
        </div>
      </div>`;
  }).join('');

  // Update stats bar
  document.getElementById('stat-pending').textContent   = (groups.pending||[]).length;
  document.getElementById('stat-inprogress').textContent = (groups.in_progress||[]).length;
  document.getElementById('stat-blocked').textContent   = (groups.blocked||[]).length;
  document.getElementById('stat-done').textContent      = (groups.done||[]).length;
  document.getElementById('stat-total').textContent     = Object.keys(board).length;
  document.getElementById('last-sync').textContent      = `Synced ${timeAgo(Math.floor(Date.now()/1000))}`;

  // Reopen sidebar if task still exists
  if (selectedTaskId && board[selectedTaskId]) {
    populateSidebar(board[selectedTaskId]);
  }
}

// ============================================================
// Sidebar
// ============================================================
function openTask(id) {
  const task = board[id];
  if (!task) return;
  selectedTaskId = id;
  populateSidebar(task);
  document.getElementById('sidebar').classList.remove('hidden');
}

function closeSidebar() {
  selectedTaskId = null;
  document.getElementById('sidebar').classList.add('hidden');
}

function populateSidebar(task) {
  const color = statusColor(task.status);
  const sb = document.getElementById('sidebar-body');
  sb.innerHTML = `
    <div class="detail-field">
      <div class="detail-label">Task ID</div>
      <div class="detail-value" style="font-family:monospace;font-size:12px">${escHtml(task.id)}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">Status</div>
      <div class="detail-value">
        <span class="status-pill" style="background:${color}22;color:${color};border:1px solid ${color}44">
          ${escHtml(task.status || 'unknown')}
        </span>
      </div>
    </div>
    <div class="detail-field">
      <div class="detail-label">Title</div>
      <div class="detail-value">${escHtml(task.title || '(no title)')}</div>
    </div>
    ${task.body ? `<div class="detail-field">
      <div class="detail-label">Description</div>
      <div class="detail-value" style="white-space:pre-wrap;font-size:12px;color:#b0b4c0">${escHtml(task.body)}</div>
    </div>` : ''}
    <div class="detail-field">
      <div class="detail-label">Assignee</div>
      <div class="detail-value">${escHtml(task.assignee || 'Unassigned')}</div>
    </div>
    ${task.priority != null ? `<div class="detail-field">
      <div class="detail-label">Priority</div>
      <div class="detail-value">${task.priority}</div>
    </div>` : ''}
    <div class="detail-field">
      <div class="detail-label">Created</div>
      <div class="detail-value">${task.created_at ? new Date(task.created_at*1000).toLocaleString() : '—'}</div>
    </div>
    ${task.started_at ? `<div class="detail-field">
      <div class="detail-label">Started</div>
      <div class="detail-value">${new Date(task.started_at*1000).toLocaleString()}</div>
    </div>` : ''}
    ${task.completed_at ? `<div class="detail-field">
      <div class="detail-label">Completed</div>
      <div class="detail-value">${new Date(task.completed_at*1000).toLocaleString()}</div>
    </div>` : ''}
    ${task.result ? `<div class="detail-field">
      <div class="detail-label">Result</div>
      <div class="detail-value" style="white-space:pre-wrap;font-size:12px;color:#b0b4c0">${escHtml(task.result)}</div>
    </div>` : ''}
    ${task.last_failure_error ? `<div class="detail-field">
      <div class="detail-label" style="color:var(--blocked)">Last Error</div>
      <div class="detail-value" style="white-space:pre-wrap;font-size:12px;color:var(--blocked)">${escHtml(task.last_failure_error)}</div>
    </div>` : ''}
    ${task.skills ? `<div class="detail-field">
      <div class="detail-label">Skills</div>
      <div class="detail-value" style="font-size:12px">${escHtml(task.skills)}</div>
    </div>` : ''}
    ${task.session_id ? `<div class="detail-field">
      <div class="detail-label">Session ID</div>
      <div class="detail-value" style="font-family:monospace;font-size:11px;color:var(--muted)">${escHtml(task.session_id)}</div>
    </div>` : ''}
  `;
}

// ============================================================
// SSE connection
// ============================================================
function setLive(connected) {
  const dot = document.getElementById('live-dot');
  const label = document.getElementById('live-label');
  if (connected) {
    dot.style.background = 'var(--done)';
    dot.style.boxShadow = '0 0 6px var(--done)';
    label.textContent = 'Live';
  } else {
    dot.style.background = 'var(--muted)';
    dot.style.boxShadow = 'none';
    label.textContent = 'Reconnecting…';
  }
}

function connectSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource('/api/events');

  eventSource.onopen = () => {
    setLive(true);
  };

  eventSource.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'snapshot') {
      board = {};
      (msg.data || []).forEach(t => board[t.id] = t);
      renderBoard();
    } else if (msg.type === 'update') {
      const changed = msg.data?.changed || [];
      changed.forEach(t => {
        if (t._deleted) {
          delete board[t.id];
        } else {
          board[t.id] = t;
        }
      });
      if (changed.length) {
        renderBoard();
        showToast(`↻ ${changed.length} task${changed.length>1?'s':''} updated`);
      }
    } else if (msg.type === 'task_update') {
      const t = msg.data;
      if (t && t.id) {
        board[t.id] = t;
        renderBoard();
      }
    }
    // ping — ignore
  };

  eventSource.onerror = () => {
    setLive(false);
    setTimeout(connectSSE, 5000);
  };
}

// ============================================================
// Toasts
// ============================================================
function showToast(msg, duration=3000) {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// ============================================================
// Helpers
// ============================================================
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// Init
// ============================================================
async function init() {
  await initUser();
  connectSSE();

  // Fallback: also fetch board via REST in case SSE doesn't deliver snapshot fast enough
  try {
    const r = await fetch('/api/board');
    const d = await r.json();
    if (!Object.keys(board).length) {
      board = {};
      Object.values(d.columns || {}).flat().forEach(t => board[t.id] = t);
      renderBoard();
    }
  } catch(e) { console.warn('REST board fetch failed', e); }
}

init();
</script>
</body>
</html>
