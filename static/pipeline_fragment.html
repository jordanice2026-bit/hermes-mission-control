<script>
// ================================================================
// PIPELINE — Global State
// ================================================================
let pipeline         = {};     // stage_key → [records]
let pipelineSearchTerm = '';
let plBulkSending    = false;
let pipelineInboxOpen = false;

const PIPELINE_STAGES = [
  { key: 'draft_ready',      label: 'Draft Ready',     icon: '✉️',  color: '#2563eb' },
  { key: 'email_sent',       label: 'Email Sent',      icon: '📨',  color: '#0891b2' },
  { key: 'replied',          label: 'Replied',          icon: '💬',  color: '#7c3aed' },
  { key: 'follow_up_draft',  label: 'Follow-Up Draft',  icon: '📝',  color: '#ea580c' },
  { key: 'approved',         label: 'Approved',         icon: '✅',  color: '#16a34a' },
  { key: 'rejected',         label: 'Rejected',         icon: '❌',  color: '#dc2626' },
];

// ================================================================
// PIPELINE — Load & Render
// ================================================================
async function loadPipeline() {
  const boardEl = document.getElementById('pipeline-board');
  if (!boardEl) return;
  boardEl.innerHTML = '<div class="loading"><div class="spinner"></div>Loading pipeline…</div>';

  try {
    const r = await fetch('/api/pipeline');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    // Accept { stages: {...} } or a flat { stage_key: [...] } object
    pipeline = data.stages || data || {};
    PIPELINE_STAGES.forEach(s => {
      if (!Array.isArray(pipeline[s.key])) pipeline[s.key] = [];
    });
    renderPipeline();
  } catch (e) {
    boardEl.innerHTML =
      `<div class="loading" style="color:var(--blocked)">
         Failed to load pipeline: ${esc(e.message)}
         <button class="pipeline-btn" style="margin-top:12px" onclick="loadPipeline()">Retry</button>
       </div>`;
  }
}

function renderPipeline() {
  const boardEl = document.getElementById('pipeline-board');
  if (!boardEl) return;

  const search = pipelineSearchTerm.toLowerCase().trim();

  boardEl.innerHTML = PIPELINE_STAGES.map(stage => {
    let records = (pipeline[stage.key] || []).slice();
    if (search) {
      records = records.filter(r =>
        (r.deal_name        || '').toLowerCase().includes(search) ||
        (r.title            || '').toLowerCase().includes(search) ||
        (r.buyer_name       || '').toLowerCase().includes(search) ||
        (r.buyer_email      || '').toLowerCase().includes(search) ||
        (r.property_address || '').toLowerCase().includes(search)
      );
    }
    return `<div class="column pipeline-column">
      <div class="col-header">
        <span style="font-size:14px;line-height:1;flex-shrink:0">${stage.icon}</span>
        <span class="col-title">${stage.label}</span>
        <span class="col-count">${records.length}</span>
      </div>
      <div class="col-body">
        ${records.length
          ? records.map(r => plCard(r, stage.key)).join('')
          : '<div class="empty-col">No records</div>'}
      </div>
    </div>`;
  }).join('');

  // Update count label
  const total = PIPELINE_STAGES.reduce((n, s) => n + (pipeline[s.key]?.length || 0), 0);
  const el = document.getElementById('pipeline-count');
  if (el) el.textContent = `${total} record${total !== 1 ? 's' : ''}`;

  // Re-render inbox badge + body if open
  renderPipelineInbox();
}

// ── Formatting helpers ────────────────────────────────────────────
function plFmtMoney(val) {
  if (val === null || val === undefined || val === '') return null;
  const n = typeof val === 'string' ? parseFloat(val.replace(/[^0-9.-]/g, '')) : Number(val);
  if (!isFinite(n)) return null;
  if (n >= 1000000) return `$${(n / 1000000).toFixed(1)}M`;
  if (n >= 1000)    return `$${Math.round(n / 1000)}K`;
  return `$${n}`;
}

function plScoreColor(score) {
  const n = parseFloat(score);
  if (!isFinite(n)) return 'var(--text3)';
  if (n >= 8) return '#16a34a';
  if (n >= 6) return '#ca8a04';
  return '#dc2626';
}

// ── Card renderer ─────────────────────────────────────────────────
function plCard(r, stageKey) {
  const id       = esc(r.id);
  const dealName = r.deal_name || r.title || '(Unnamed Deal)';

  const askRaw   = r.price     ?? r.ask_price;
  const arvRaw   = r.arv;
  const sprdRaw  = r.spread    != null ? r.spread
                 : (arvRaw != null && askRaw != null ? arvRaw - askRaw : null);

  const ask   = plFmtMoney(askRaw);
  const arv   = plFmtMoney(arvRaw);
  const sprd  = plFmtMoney(sprdRaw);
  const chips = [
    ask  ? `<span class="pipeline-stat-chip">${ask} ask</span>`     : '',
    arv  ? `<span class="pipeline-stat-chip">${arv} ARV</span>`     : '',
    sprd ? `<span class="pipeline-stat-chip">${sprd} spread</span>` : '',
  ].join('');

  const score     = r.match_score ?? r.score;
  const scoreHtml = score != null ? (() => {
    const sc = plScoreColor(score);
    return `<span class="match-score-badge" style="background:${sc}22;color:${sc};border:1px solid ${sc}44">${Number(score).toFixed(1)}</span>`;
  })() : '';

  return `<div class="pipeline-card">
    <div class="pipeline-card-header">
      <div class="pipeline-card-title">${esc(dealName)}</div>
      ${scoreHtml}
    </div>
    ${r.buyer_name
      ? `<div class="pipeline-card-buyer">${esc(r.buyer_name)}${r.buyer_email
          ? ` · <span style="color:var(--text3)">${esc(r.buyer_email)}</span>` : ''}</div>`
      : ''}
    ${r.property_address
      ? `<div class="pipeline-card-address">${esc(r.property_address)}</div>`
      : ''}
    ${chips ? `<div class="pipeline-stats-chips">${chips}</div>` : ''}
    <div class="pipeline-card-footer">
      <span class="task-age">${timeAgo(r.created_at)}</span>
      <div class="pipeline-card-actions">${plCardActions(r, stageKey)}</div>
    </div>
  </div>`;
}

function plCardActions(r, stageKey) {
  const id = esc(r.id);
  switch (stageKey) {
    case 'draft_ready':
      return `<button class="pipeline-btn pipeline-btn-sm" onclick="openPipelineEdit('${id}')">✏️ Edit</button>
              <button class="pipeline-btn pipeline-btn-sm pipeline-btn-primary" onclick="confirmSingleSend('${id}')">✅ Send</button>
              <button class="pipeline-btn pipeline-btn-sm" onclick="openEditAndAiFix('${id}')">🤖 AI Fix</button>`;
    case 'email_sent':
      return `<button class="pipeline-btn pipeline-btn-sm" onclick="openPipelineEdit('${id}')">View</button>`;
    case 'replied':
      return `<button class="pipeline-btn pipeline-btn-sm" onclick="openReplyModal('${id}')">View Reply</button>
              <button class="pipeline-btn pipeline-btn-sm pipeline-btn-primary" onclick="draftFollowUp('${id}',this)">Draft Follow-Up</button>`;
    case 'follow_up_draft':
      return `<button class="pipeline-btn pipeline-btn-sm" onclick="openPipelineEdit('${id}')">✏️ Edit</button>
              <button class="pipeline-btn pipeline-btn-sm pipeline-btn-primary" onclick="confirmSingleSend('${id}')">✅ Send</button>`;
    default:
      return `<button class="pipeline-btn pipeline-btn-sm" onclick="openPipelineEdit('${id}')">View</button>`;
  }
}

// ── Record lookup ──────────────────────────────────────────────────
function getPipelineRecord(id) {
  for (const s of PIPELINE_STAGES) {
    const found = (pipeline[s.key] || []).find(r => String(r.id) === String(id));
    if (found) return found;
  }
  return null;
}

// ================================================================
// PIPELINE — Edit / Draft Modal
// ================================================================
function openPipelineEdit(id) {
  const r = getPipelineRecord(id);
  if (!r) { showToast('Record not found'); return; }

  document.getElementById('pl-modal-title').textContent  = r.deal_name || r.title || '(Unnamed Deal)';
  document.getElementById('pl-modal-id').value           = r.id;
  document.getElementById('pl-modal-subject').value      = r.email_subject || '';
  document.getElementById('pl-modal-body-txt').value     = r.email_body    || '';
  document.getElementById('pl-modal-errors').value       = r.error_notes   || '';

  // Reset button states
  ['pl-save-btn','pl-send-btn','pl-ai-fix-btn'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.disabled = false;
  });
  document.getElementById('pl-save-btn').textContent  = '💾 Save Draft';
  document.getElementById('pl-send-btn').textContent  = '📨 Send Email';
  document.getElementById('pl-ai-fix-btn').textContent = '🤖 AI Fix';

  document.getElementById('pl-edit-modal').classList.add('active');
  setTimeout(() => document.getElementById('pl-modal-subject').focus(), 60);
}

function openEditAndAiFix(id) {
  openPipelineEdit(id);
  setTimeout(() => runAiFix(), 150);
}

function closePipelineEditModal() {
  document.getElementById('pl-edit-modal').classList.remove('active');
}

async function savePipelineDraft() {
  const id      = document.getElementById('pl-modal-id').value;
  const subject = document.getElementById('pl-modal-subject').value.trim();
  const body    = document.getElementById('pl-modal-body-txt').value;
  const errors  = document.getElementById('pl-modal-errors').value;

  const btn = document.getElementById('pl-save-btn');
  btn.disabled    = true;
  btn.textContent = '💾 Saving…';

  try {
    const r = await fetch(`/api/pipeline/${encodeURIComponent(id)}/draft`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email_subject: subject, email_body: body, error_notes: errors }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    // Update local cache
    const rec = getPipelineRecord(id);
    if (rec) {
      rec.email_subject = subject;
      rec.email_body    = body;
      rec.error_notes   = errors;
    }
    showToast('Draft saved ✓');
  } catch (e) {
    showToast(`Save failed: ${e.message}`, 5000);
  } finally {
    btn.disabled    = false;
    btn.textContent = '💾 Save Draft';
  }
}

async function sendFromModal() {
  const id      = document.getElementById('pl-modal-id').value;
  const subject = document.getElementById('pl-modal-subject').value.trim();
  const body    = document.getElementById('pl-modal-body-txt').value;
  const errors  = document.getElementById('pl-modal-errors').value;

  const btn = document.getElementById('pl-send-btn');
  btn.disabled    = true;
  btn.textContent = '📨 Sending…';

  try {
    // Persist edits first so the server has the latest content
    await fetch(`/api/pipeline/${encodeURIComponent(id)}/draft`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email_subject: subject, email_body: body, error_notes: errors }),
    });
    const r = await fetch(`/api/pipeline/${encodeURIComponent(id)}/send`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    showToast('Email sent ✓');
    closePipelineEditModal();
    await loadPipeline();
  } catch (e) {
    showToast(`Send failed: ${e.message}`, 5000);
    btn.disabled    = false;
    btn.textContent = '📨 Send Email';
  }
}

async function runAiFix() {
  const id   = document.getElementById('pl-modal-id').value;
  const desc = document.getElementById('pl-modal-errors').value.trim() || 'General correction';

  const btn = document.getElementById('pl-ai-fix-btn');
  btn.disabled    = true;
  btn.textContent = '🤖 Fixing…';

  try {
    const r = await fetch(`/api/pipeline/${encodeURIComponent(id)}/ai-fix`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ error_description: desc }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const bodyVal    = data.email_body    || data.body    || null;
    const subjectVal = data.email_subject || data.subject || null;
    if (bodyVal    != null) document.getElementById('pl-modal-body-txt').value = bodyVal;
    if (subjectVal != null) document.getElementById('pl-modal-subject').value  = subjectVal;
    showToast('AI fix applied ✓');
  } catch (e) {
    showToast(`AI fix failed: ${e.message}`, 5000);
  } finally {
    btn.disabled    = false;
    btn.textContent = '🤖 AI Fix';
  }
}

// ================================================================
// PIPELINE — Single Send (from card button)
// ================================================================
async function confirmSingleSend(id) {
  const r    = getPipelineRecord(id);
  const name = r ? (r.deal_name || r.title || id) : id;
  if (!confirm(`Send email for "${name}"?`)) return;

  try {
    const resp = await fetch(`/api/pipeline/${encodeURIComponent(id)}/send`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    showToast('Email sent ✓');
    await loadPipeline();
  } catch (e) {
    showToast(`Send failed: ${e.message}`, 5000);
  }
}

// ================================================================
// PIPELINE — Reply View Modal
// ================================================================
function openReplyModal(id) {
  const r = getPipelineRecord(id);
  if (!r) { showToast('Record not found'); return; }

  document.getElementById('pl-reply-title').textContent  = r.deal_name || r.title || '(Unnamed Deal)';
  document.getElementById('pl-reply-id').value           = r.id;
  document.getElementById('pl-reply-from').textContent   =
    [r.buyer_name, r.buyer_email].filter(Boolean).join(' · ') || '—';
  document.getElementById('pl-reply-body-txt').textContent =
    r.reply_body || r.reply || r.reply_text || '(No reply content available)';

  document.getElementById('pl-reply-modal').classList.add('active');
}

function closePipelineReplyModal() {
  document.getElementById('pl-reply-modal').classList.remove('active');
}

function startDraftFollowUpFromReply() {
  const id = document.getElementById('pl-reply-id').value;
  closePipelineReplyModal();
  draftFollowUp(id, null);
}

async function draftFollowUp(id, btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Drafting…'; }
  try {
    const r = await fetch(`/api/pipeline/${encodeURIComponent(id)}/ai-fix`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ type: 'follow_up' }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    showToast('Follow-up draft created ✓');
    await loadPipeline();
  } catch (e) {
    showToast(`Draft follow-up failed: ${e.message}`, 5000);
    if (btn) { btn.disabled = false; btn.textContent = 'Draft Follow-Up'; }
  }
}

// ================================================================
// PIPELINE — Bulk Send Modal
// ================================================================
function openBulkSend() {
  const drafts = pipeline['draft_ready'] || [];
  if (!drafts.length) {
    showToast('No Draft Ready records to send', 3000);
    return;
  }

  document.getElementById('pl-bulk-count').textContent =
    `${drafts.length} email${drafts.length !== 1 ? 's' : ''} ready to send:`;

  document.getElementById('pl-bulk-list').innerHTML = drafts.map(r =>
    `<div class="pl-bulk-recipient">
      <span class="pl-bulk-rname">${esc(r.buyer_name || 'Unknown')}</span>
      <span class="pl-bulk-remail">${esc(r.buyer_email || '—')}</span>
      <span class="pl-bulk-rdeal">${esc(r.deal_name || r.title || '')}</span>
    </div>`
  ).join('');

  // Reset progress UI
  document.getElementById('pl-bulk-progress').style.display   = 'none';
  document.getElementById('pl-bulk-bar').style.width          = '0%';
  document.getElementById('pl-bulk-progress-text').textContent = '';
  document.getElementById('pl-bulk-confirm-btn').style.display = '';
  document.getElementById('pl-bulk-cancel-btn').style.display  = '';
  document.getElementById('pl-bulk-close-btn').style.display   = '';
  plBulkSending = false;

  document.getElementById('pl-bulk-modal').classList.add('active');
}

function closeBulkSendModal() {
  if (plBulkSending) return;
  document.getElementById('pl-bulk-modal').classList.remove('active');
}

async function confirmBulkSend() {
  const drafts = (pipeline['draft_ready'] || []).slice();
  if (!drafts.length) return;

  plBulkSending = true;
  const confirmBtn  = document.getElementById('pl-bulk-confirm-btn');
  const cancelBtn   = document.getElementById('pl-bulk-cancel-btn');
  const closeBtn    = document.getElementById('pl-bulk-close-btn');
  const progressEl  = document.getElementById('pl-bulk-progress');
  const bar         = document.getElementById('pl-bulk-bar');
  const progressTxt = document.getElementById('pl-bulk-progress-text');

  confirmBtn.style.display = 'none';
  cancelBtn.style.display  = 'none';
  closeBtn.style.display   = 'none';
  progressEl.style.display = '';
  progressTxt.textContent  = `Sending ${drafts.length} emails…`;
  bar.style.width = '10%';

  const total = drafts.length;
  let succeeded = 0, failed = 0;
  const failedNames = [];

  try {
    // Primary: bulk send endpoint — sends all draft_ready records in one call
    const resp = await fetch('/api/pipeline/send-all', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ ids: drafts.map(r => r.id) }),
    });
    if (resp.ok) {
      const data = await resp.json();
      // Server may return { sent, failed, errors } or just { sent }
      succeeded = data.sent  ?? total;
      failed    = data.failed ?? 0;
      if (Array.isArray(data.errors)) {
        data.errors.forEach(e => failedNames.push(e.name || e.id || 'unknown'));
      }
      bar.style.width = '100%';
      progressTxt.textContent = `Sent ${succeeded} of ${total}`;
    } else {
      // Fallback: send per-record if bulk endpoint fails
      throw new Error(`HTTP ${resp.status}`);
    }
  } catch (_bulkErr) {
    // Fallback: iterate individually
    for (const r of drafts) {
      const sent = succeeded + failed + 1;
      progressTxt.textContent = `Sending ${sent} of ${total}… ${esc(r.buyer_name || r.id)}`;
      try {
        const resp = await fetch(`/api/pipeline/${encodeURIComponent(r.id)}/send`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        succeeded++;
      } catch (e) {
        failed++;
        failedNames.push(r.buyer_name || r.id);
      }
      bar.style.width = `${Math.round((succeeded + failed) / total * 100)}%`;
    }
  }

  plBulkSending = false;
  document.getElementById('pl-bulk-modal').classList.remove('active');

  const preview = failedNames.slice(0, 3).join(', ') + (failedNames.length > 3 ? '…' : '');
  const summary = failed === 0
    ? `✓ All ${succeeded} emails sent successfully`
    : `Sent ${succeeded} of ${total} · ${failed} failed: ${preview}`;
  showToast(summary, failed > 0 ? 7000 : 4000);

  await loadPipeline();
}

// ================================================================
// PIPELINE — Inbox Section
// ================================================================
function togglePipelineInbox() {
  pipelineInboxOpen = !pipelineInboxOpen;
  const body    = document.getElementById('pipeline-inbox-body');
  const chevron = document.getElementById('pipeline-inbox-chevron');
  body.classList.toggle('open', pipelineInboxOpen);
  chevron.classList.toggle('open', pipelineInboxOpen);
  if (pipelineInboxOpen) renderPipelineInbox();
}

function renderPipelineInbox() {
  const body  = document.getElementById('pipeline-inbox-body');
  const badge = document.getElementById('pipeline-inbox-badge');
  if (!body) return;

  const replied  = pipeline['replied']         || [];
  const followUp = pipeline['follow_up_draft'] || [];
  const count    = replied.length + followUp.length;

  if (badge) {
    badge.textContent = count;
    badge.classList.toggle('empty', count === 0);
  }

  if (!pipelineInboxOpen) return;

  if (!count) {
    body.innerHTML =
      '<div style="color:var(--text3);font-size:12px;padding:6px 0">No replies or follow-up drafts.</div>';
    return;
  }

  const parts = [];

  if (replied.length) {
    parts.push(`<div class="inbox-section-label">Replies (${replied.length})</div>`);
    replied.forEach(r => parts.push(plInboxCard(r, 'replied')));
  }

  if (followUp.length) {
    parts.push(`<div class="inbox-section-label" style="padding-top:10px">Follow-Up Drafts (${followUp.length})</div>`);
    followUp.forEach(r => parts.push(plInboxCard(r, 'follow_up_draft')));
  }

  body.innerHTML = parts.join('');
}

function plInboxCard(r, stageKey) {
  const id       = esc(r.id);
  const dealName = r.deal_name || r.title || '(Unnamed Deal)';
  const snippet  = stageKey === 'replied'
    ? (r.reply_body || r.reply || r.reply_text || '')
    : (r.email_body || '');

  const actions = stageKey === 'replied'
    ? `<button class="pipeline-btn pipeline-btn-sm" onclick="openReplyModal('${id}')">View Reply</button>
       <button class="pipeline-btn pipeline-btn-sm pipeline-btn-primary" onclick="draftFollowUp('${id}',this)">Draft Follow-Up</button>`
    : `<button class="pipeline-btn pipeline-btn-sm" onclick="openPipelineEdit('${id}')">✏️ Edit</button>
       <button class="pipeline-btn pipeline-btn-sm pipeline-btn-primary" onclick="confirmSingleSend('${id}')">✅ Send</button>`;

  return `<div class="inbox-card">
    <div class="inbox-card-left">
      <div class="inbox-deal-name">${esc(dealName)}</div>
      <div class="inbox-buyer">${esc(r.buyer_name || '')}${r.buyer_email ? ' · ' + esc(r.buyer_email) : ''}</div>
      ${snippet ? `<div class="inbox-reply-snippet">${esc(snippet)}</div>` : ''}
    </div>
    <div class="inbox-card-actions">${actions}</div>
  </div>`;
}

async function checkPipelineInbox() {
  try {
    const r = await fetch('/api/pipeline/inbox-check');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const newReplies = data.new_replies ?? data.count ?? 0;
    showToast(newReplies > 0
      ? `Inbox: ${newReplies} new repl${newReplies !== 1 ? 'ies' : 'y'} found ✓`
      : 'Inbox checked — no new replies');
    await loadPipeline();
  } catch (e) {
    showToast(`Inbox check failed: ${e.message}`, 5000);
  }
}

// ================================================================
// PIPELINE — Extend switchView to handle 'pipeline'
// ================================================================
(function patchSwitchView() {
  const _orig = switchView;

  switchView = function(view, dept, agent) {
    const pipelineEl = document.getElementById('view-pipeline');

    if (view === 'pipeline') {
      // Deactivate all existing views
      ['board','departments','dept-detail','agent-board'].forEach(v => {
        document.getElementById(`view-${v}`)?.classList.remove('active');
      });
      pipelineEl?.classList.add('active');

      // Nav highlight
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.querySelector('.nav-item[data-view="pipeline"]')?.classList.add('active');

      // Hide KPI bar and breadcrumb (not relevant for pipeline)
      document.getElementById('kpi-bar')?.classList.add('hidden');
      document.getElementById('breadcrumb-bar')?.classList.add('hidden');

      currentView = 'pipeline';
      loadPipeline();
      return;
    }

    // Ensure pipeline view is hidden for all other views
    pipelineEl?.classList.remove('active');
    _orig.call(this, view, dept, agent);
  };
})();
