services:
  - type: web
    name: hermes-mission-control
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SYNC_TOKEN
        generateValue: true
      - key: ALLOWED_EMAILS
        sync: false
    healthCheckPath: /health
